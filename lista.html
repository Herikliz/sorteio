<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerenciador de Lista</title>
<style>
body {
  font-family: sans-serif;
  background-color: #f4f4f9;
  color: #333;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  background: #fff;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
h1 {
  text-align: center;
}
.panel {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  padding: 15px;
  background: #eef;
  border-radius: 6px;
}
input, select, button {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}
button {
  background-color: #2c3e50;
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
}
button:hover {
  background-color: #1a252f;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  background: #fafafa;
  margin-bottom: 8px;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  display: flex;
  justify-content: space-between;
}
#sorteioResult {
  margin-top: 20px;
  padding: 15px;
  background: #e8f5e9;
  border-radius: 6px;
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <h1>Gerenciador de Itens</h1>

  <div class="panel">
    <input type="text" id="newName" placeholder="Nome do Item">
    <select id="newType" onchange="toggleSubtype()">
      <option value="Akuma no Mi">Akuma no Mi</option>
      <option value="Ilha">Ilha</option>
    </select>
    <select id="newSubtype">
      <option value="Paramecia">Paramecia</option>
      <option value="Paramecia Especial">Paramecia Especial</option>
      <option value="Logia">Logia</option>
      <option value="Zoan">Zoan</option>
      <option value="Zoan Ancestral">Zoan Ancestral</option>
      <option value="Zoan Mítica">Zoan Mítica</option>
    </select>
    <button onclick="addItem()">Adicionar à Lista</button>
  </div>

  <div class="panel">
    <input type="text" id="searchInput" placeholder="Pesquisar por nome..." onkeyup="renderList()">
    <select id="filterType" onchange="renderList()">
      <option value="">Todos os Tipos</option>
      <option value="Akuma no Mi">Akuma no Mi</option>
      <option value="Ilha">Ilha</option>
    </select>
    <select id="filterSubtype" onchange="renderList()">
      <option value="">Todos os Sub-tipos</option>
      <option value="Paramecia">Paramecia</option>
      <option value="Paramecia Especial">Paramecia Especial</option>
      <option value="Logia">Logia</option>
      <option value="Zoan">Zoan</option>
      <option value="Zoan Ancestral">Zoan Ancestral</option>
      <option value="Zoan Mítica">Zoan Mítica</option>
    </select>
    <button onclick="sortear()">Sortear Itens</button>
  </div>

  <div id="sorteioResult"></div>

  <ul id="itemList"></ul>
</div>

<script>
const defaultData = [
  { name: "Fruta do Crescimento", type: "Akuma no Mi", subtype: "Paramecia" },
  { name: "Fruta do Chicote", type: "Akuma no Mi", subtype: "Paramecia" },
  { name: "Sandy", type: "Ilha", subtype: "" },
  { name: "Sabaody", type: "Ilha", subtype: "" }
];

let items = JSON.parse(localStorage.getItem('savedItemsList'));

if (!items) {
  items = defaultData;
  saveItems();
}

function saveItems() {
  localStorage.setItem('savedItemsList', JSON.stringify(items));
}

function toggleSubtype() {
  const type = document.getElementById('newType').value;
  const subtypeSelect = document.getElementById('newSubtype');
  if (type === 'Ilha') {
    subtypeSelect.style.display = 'none';
    subtypeSelect.value = '';
  } else {
    subtypeSelect.style.display = 'inline-block';
    subtypeSelect.value = 'Paramecia';
  }
}

function addItem() {
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const subtype = document.getElementById('newSubtype').value;

  if (!name) return;

  items.push({ name, type, subtype });
  saveItems();
  document.getElementById('newName').value = '';
  renderList();
}

function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const fType = document.getElementById('filterType').value;
  const fSubtype = document.getElementById('filterSubtype').value;
  const listEl = document.getElementById('itemList');

  listEl.innerHTML = '';

  let filtered = items.filter(item => {
    const matchSearch = item.name.toLowerCase().includes(search);
    const matchType = fType === "" || item.type === fType;
    const matchSubtype = fSubtype === "" || item.subtype === fSubtype;
    return matchSearch && matchType && matchSubtype;
  });

  filtered.forEach(item => {
    const li = document.createElement('li');
    const text = document.createElement('span');
    let content = `${item.name} - ${item.type}`;
    if (item.subtype) {
      content += ` (${item.subtype})`;
    }
    text.textContent = content;
    li.appendChild(text);
    listEl.appendChild(li);
  });
}

function sortear() {
  const resultEl = document.getElementById('sorteioResult');
  resultEl.innerHTML = '';
  resultEl.style.display = 'none';

  let qtdAkuma = prompt("Quantas Akuma no Mi deseja sortear?");
  if (qtdAkuma === null) return;
  
  let qtdIlhas = prompt("Quantas Ilhas deseja sortear?");
  if (qtdIlhas === null) return;

  qtdAkuma = parseInt(qtdAkuma) || 0;
  qtdIlhas = parseInt(qtdIlhas) || 0;

  let akumas = items.filter(i => i.type === 'Akuma no Mi');
  let ilhas = items.filter(i => i.type === 'Ilha');

  akumas = akumas.sort(() => 0.5 - Math.random()).slice(0, qtdAkuma);
  ilhas = ilhas.sort(() => 0.5 - Math.random()).slice(0, qtdIlhas);

  const sorteados = [...akumas, ...ilhas];

  if (sorteados.length > 0) {
    resultEl.style.display = 'block';
    const h3 = document.createElement('h3');
    h3.textContent = "Resultado do Sorteio:";
    h3.style.marginTop = '0';
    resultEl.appendChild(h3);
    
    const ul = document.createElement('ul');
    sorteados.forEach(item => {
      const li = document.createElement('li');
      let content = `${item.name} - ${item.type}`;
      if (item.subtype) {
        content += ` (${item.subtype})`;
      }
      li.textContent = content;
      li.style.background = '#fff';
      ul.appendChild(li);
    });
    resultEl.appendChild(ul);
  }
}

window.onload = () => {
  toggleSubtype();
  renderList();
};
</script>
</body>
</html>
