<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerenciador de Lista</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Gerenciador de Itens</h1>

  <div class="panel">
    <input type="text" id="newName" placeholder="Nome do Item">
    <select id="newType">
      <option value="Akuma no Mi">Akuma no Mi</option>
      <option value="Ilha">Ilha</option>
    </select>
    <select id="newSubtype"></select>
    <button id="addBtn">Adicionar à Lista</button>
  </div>

  <div class="panel">
    <input type="text" id="searchInput" placeholder="Pesquisar por nome...">
    <select id="filterCategory">
      <option value="Paramecias">Paramecias</option>
      <option value="Logias">Logias</option>
      <option value="Zoans">Zoans</option>
      <option value="Ilhas">Ilhas</option>
    </select>
    <button id="sortearBtn">Sortear Itens</button>
  </div>

  <div id="pedidosArea"></div>
  <div id="sorteioResult"></div>

  <ul id="itemList"></ul>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
