<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerenciador de Lista</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Gerenciador de Itens</h1>

  <div class="panel">
    <textarea id="newName" placeholder="Nome do Item (cole a lista, um por linha)" style="padding: 10px 14px; border: 1px solid #444; border-radius: 6px; font-size: 14px; background-color: #333; color: #fff; min-width: 200px; height: 38px; resize: vertical; font-family: 'Segoe UI', sans-serif;"></textarea>
    <select id="newType">
      <option value="Akuma no Mi">Akuma no Mi</option>
      <option value="Ilha">Ilha</option>
    </select>
    <select id="newSubtype"></select>
    <select id="newSea" style="display: none;">
      <option value="East Blue">East Blue</option>
      <option value="West Blue">West Blue</option>
      <option value="North Blue">North Blue</option>
      <option value="South Blue">South Blue</option>
      <option value="Paraíso">Paraíso</option>
      <option value="Novo Mundo">Novo Mundo</option>
      <option value="Calm Belt">Calm Belt</option>
      <option value="Localização Desconhecida">Localização Desconhecida</option>
    </select>
    <button id="addBtn">Adicionar à Lista</button>
  </div>

  <div class="panel">
    <input type="text" id="searchInput" placeholder="Pesquisar por nome...">
    <select id="filterCategory">
      <option value="Tudo">Mostrar Tudo</option>
      <option value="Frutas">Todas as Frutas</option>
      <option value="Ilhas">Somente Ilhas</option>
    </select>
    <button id="sortearBtn">Sortear Itens</button>
    <button onclick="migrarTodosParaIdsDeNome()" style="background-color: #8e44ad;">Migrar IDs para Nomes</button>
  </div>
  
  <div id="progressContainer" style="display: none; background: #333; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #444;">
    <div id="progressBar" style="width: 0%; height: 20px; background: #27ae60; text-align: center; color: white; font-size: 12px; line-height: 20px; transition: width 0.2s;">0%</div>
  </div>

  <div id="pedidosArea"></div>
  <div id="sorteioResult"></div>

  <ul id="itemList"></ul>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
